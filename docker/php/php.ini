; PHP overrides chargés en dernier (préfixe zz-).
; Valeurs adaptées à Laravel 12 + uploads PDF + génération PDF wkhtmltopdf.

memory_limit = 512M
; 30 min — necessaire pour l'import de dumps SQL via POST /api/superadmin/databases/import
; Les requetes courtes ne sont pas affectees : c'est un PLAFOND, pas une duree par defaut.
max_execution_time = 1800
max_input_time = 1800

; 1 GB — permet l'import de dumps tenants volumineux.
; Aligne avec nginx client_max_body_size dans docker/nginx/default.conf
post_max_size = 1G
upload_max_filesize = 1G
max_file_uploads = 20

date.timezone = Europe/Paris

expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Sessions Redis (le driver Laravel s'occupe du préfixage par tenant).
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1

; OPcache — activé en prod, neutralisé en dev via override docker-compose.override.yml.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.jit_buffer_size = 64M
opcache.jit = tracing

realpath_cache_size = 4M
realpath_cache_ttl = 600
