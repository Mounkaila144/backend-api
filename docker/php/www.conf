; PHP-FPM pool — surcharge la pool [www] par défaut.
; Tuning conservateur (VPS 2-4 vCPU, 4-8 GB RAM). Ajuste pm.max_children
; selon (RAM disponible) / (memory_limit moyen par requête).

[www]
user = www-data
group = www-data

listen = 9000
listen.backlog = 511

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Logs et metrics
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

clear_env = no
