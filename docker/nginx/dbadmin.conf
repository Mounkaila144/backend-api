# phpMyAdmin sur dbadmin.icall26.ptrniger.com — proxy vers le conteneur phpmyadmin.
# Protégé par auth HTTP basic (en plus du login MySQL). Certificat wildcard partagé.

server {
    listen 80;
    server_name dbadmin.icall26.ptrniger.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name dbadmin.icall26.ptrniger.com;

    ssl_certificate     /etc/letsencrypt/live/icall26.ptrniger.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/icall26.ptrniger.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # --- Authentification HTTP (1re barrière) ---
    auth_basic           "Acces restreint - base de donnees";
    auth_basic_user_file /etc/nginx/.htpasswd;

    client_max_body_size 2048M;

    location / {
        proxy_pass http://phpmyadmin:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
