# Nginx — PROD avec SSL Let's Encrypt wildcard.
# Pré-requis :
#   1. Wildcard DNS  *.tondomaine.com  →  IP du VPS
#   2. Cert wildcard (challenge DNS-01) :
#        certbot certonly --manual --preferred-challenges=dns \
#          -d 'tondomaine.com' -d '*.tondomaine.com'
#   3. /etc/letsencrypt/ monté en read-only dans le container nginx.
#
# Reverse proxy unique :
#   - /api/* + /sanctum/* + /up  → Laravel (php-fpm:9000)
#   - tout le reste              → Next.js (frontend:3000)

upstream nextjs {
    server frontend:3000;
}

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80 default_server;
    server_name tondomaine.com *.tondomaine.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS — sert toute la stack pour TOUS les sous-domaines ---
server {
    listen 443 ssl http2 default_server;
    server_name tondomaine.com *.tondomaine.com;

    ssl_certificate     /etc/letsencrypt/live/tondomaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tondomaine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    root  /var/www/html/public;
    index index.php;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    client_max_body_size 64M;

    # --- Laravel : routes API ---
    location ~ ^/(api|sanctum|up)(/|$) {
        try_files $uri /index.php?$query_string;
    }

    # --- Laravel : exécution PHP ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT    $realpath_root;
        fastcgi_param HTTPS            on;
        fastcgi_param HTTP_PROXY       "";
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    # --- Next.js : tout le reste ---
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    location ~ /\.(?!well-known) { deny all; }
    location ~ /(\.env|composer\.(json|lock)|artisan|package\.json) { deny all; }
}
