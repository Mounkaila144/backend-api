# Nginx — DEV (HTTP only, port 80 du container, exposé en 8080 sur l'hôte).
# Reverse proxy unique :
#   - /api/*       → Laravel (php-fpm:9000)
#   - /sanctum/*   → Laravel (Sanctum SPA cookie)
#   - /up          → Laravel healthcheck
#   - tout le reste → Next.js (frontend:3000)
#
# Avantage : même origine pour le navigateur → ZÉRO problème CORS.
# Hosts à ajouter dans C:\Windows\System32\drivers\etc\hosts si tu utilises
# des sous-domaines tenant en local :
#   127.0.0.1  superadmin.local tenant1.backend.local

upstream nextjs {
    server frontend:3000;
}

server {
    listen 80 default_server;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    gzip on;
    gzip_types application/json application/javascript text/css text/plain;
    gzip_min_length 1024;

    client_max_body_size 1G;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    # --- Laravel : import dump SQL (gros body + long traitement) ---
    # Match AVANT la règle générique pour appliquer ses timeouts plus longs.
    location = /api/superadmin/databases/import {
        client_max_body_size 1G;
        client_body_timeout  1800s;
        try_files $uri /index.php?$query_string;
    }

    # --- Laravel : routes API ---
    location ~ ^/(api|sanctum|up)(/|$) {
        try_files $uri /index.php?$query_string;
    }

    # --- Laravel : exécution PHP ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT    $realpath_root;
        fastcgi_param HTTP_PROXY       "";
        # Timeouts élevés pour permettre l'import de dumps SQL volumineux
        # (le service Laravel a sa propre limite à 1800s côté Process).
        fastcgi_read_timeout 1800s;
        fastcgi_send_timeout 1800s;
    }

    # --- Next.js : tout le reste (pages, _next/static, _next/image, HMR) ---
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hot Module Reload (websocket) en dev
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # Sécurité : interdit l'accès aux fichiers sensibles
    location ~ /\.(?!well-known) { deny all; }
    location ~ /(\.env|composer\.(json|lock)|artisan|package\.json) { deny all; }
}
